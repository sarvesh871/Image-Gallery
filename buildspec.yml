version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci

  build:
    commands:
      - echo "Building React application..."
      - npm run build

artifacts:
  base-directory: dist
  files:
    - '**/*'

cache:
  paths:
    - node_modules/**/*